name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH to Ubuntu Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deployment to Omni-Platform server..."

            # Load NVM and Node.js environment
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              \. "$NVM_DIR/nvm.sh"
            fi

            # Check Node & NPM versions
            echo "Node: $(node -v 2>/dev/null || echo 'not found')"
            echo "NPM:  $(npm -v 2>/dev/null || echo 'not found')"

            APP_DIR="$HOME/omni-platform"
            if [ -d "$APP_DIR" ]; then
              echo "📂 Navigating to $APP_DIR and pulling latest changes..."
              cd "$APP_DIR"
              git fetch origin
              git checkout main || git checkout recovery/closed-issues-1-20
              git pull origin $(git rev-parse --abbrev-ref HEAD)
            else
              echo "📦 Cloning repository..."
              git clone https://github.com/junans0boi/omni-platform.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            echo "📦 Installing production & build dependencies..."
            npm ci --production=false

            echo "🗄️ Running Prisma migrations / DB Push..."
            npx prisma generate
            npx prisma db push

            echo "🏗️ Building Next.js application..."
            npm run build

            echo "🔄 Restarting application with PM2..."
            mkdir -p logs
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
              pm2 save
            else
              npx pm2 restart ecosystem.config.js || npx pm2 start ecosystem.config.js
              npx pm2 save
            fi

            echo "🎉 Deployment completed successfully!"
